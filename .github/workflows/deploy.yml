name: Deploy

on:
  push:
    branches: [ main ]

concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@trunk

      - uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: typst-cli

      - name: Install Shadow
        run: cargo install --git https://github.com/AzurIce/shadow.git --locked

      - name: Restore Shadow cache
        uses: actions/cache@v4
        with:
          path: .shadow/cache
          key: ${{ runner.os }}-shadow-${{ hashFiles('shadow.toml', '.shadow/refs/**/*.ref') }}
          restore-keys: |
            ${{ runner.os }}-shadow-

      - name: Restore gallery
        run: shadow restore gallery
        env:
          TOS_ACCESS_KEY: ${{ secrets.TOS_ACCESS_KEY }}
          TOS_SECRET_KEY: ${{ secrets.TOS_SECRET_KEY }}
          TOS_SECURITY_TOKEN: ${{ secrets.TOS_SECURITY_TOKEN }}

      - name: Cargo build
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Trunk build
        run: trunk build --release
      
      - run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

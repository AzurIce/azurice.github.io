<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xiv-market-lite 已迁移</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family:
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      color: #172033;
      background: #f7f7f4;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    main {
      width: min(100%, 560px);
      padding: 32px;
      border: 1px solid #d8d8d0;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 16px 48px rgb(23 32 51 / 8%);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.25;
      font-weight: 700;
    }

    p {
      margin: 0 0 20px;
      font-size: 16px;
      line-height: 1.7;
      color: #4b5565;
    }

    a {
      color: #1a5fb4;
      overflow-wrap: anywhere;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 6px;
      background: #1f2937;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color: #f4f6fb;
        background: #111827;
      }

      main {
        border-color: #374151;
        background: #172033;
        box-shadow: none;
      }

      p {
        color: #cbd5e1;
      }

      a {
        color: #8ab4f8;
      }

      .button {
        background: #e5e7eb;
        color: #111827;
      }
    }
  </style>
</head>

<body>
  <main>
    <h1>xiv-market-lite 地址已迁移</h1>
    <p>
      当前页面已迁移到
      <a href="https://azurice.github.io/xiv-market">https://azurice.github.io/xiv-market</a>。
    </p>
    <a class="button" href="https://azurice.github.io/xiv-market">前往新地址</a>
  </main>
</body>

</html>
